version: '3.9'
services:
  backend:
    build: ./backend
    container_name: brain-backend
    ports: 
      - "8000:8000"
    env_file:
      - ./backend/env
    restart: always
  frontend:
    build: ./frontend
    container_name: brain-frontend
    ports:
      - "8501:8501"
    depends_on:
      - backend
    restart: always